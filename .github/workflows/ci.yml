name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff pre-commit
      - run: ruff check app/ tests/ config.py manage.py
      - run: pre-commit run --all-files

  test:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-test-secret-key-at-least-32-chars-long
      FERNET_KEY: ci-test-fernet-key-for-testing-only-32b!
      FLASK_ENV: testing
      TEST_DATABASE_URL: "sqlite:///:memory:"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest tests/ -q --tb=short --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=90
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t qa-platform:ci .
      - run: docker build -f Dockerfile.sandbox -t qa-platform-sandbox:ci .
