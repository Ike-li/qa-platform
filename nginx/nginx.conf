upstream flask {
    server web:5000;
}

# Uncomment for HTTPS (requires SSL certificate files in /etc/nginx/ssl/)
# server {
#     listen 80;
#     server_name _;
#     return 301 https://$host$request_uri;
# }

server {
    # For HTTPS, change to: listen 443 ssl http2;
    listen 80;
    server_name _;

    # For HTTPS, uncomment and configure:
    # ssl_certificate /etc/nginx/ssl/cert.pem;
    # ssl_certificate_key /etc/nginx/ssl/key.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' cdn.jsdelivr.net 'unsafe-inline'; img-src 'self' data:;" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Allure reports: serve static files directly from shared volume
    location /reports/ {
        alias /usr/share/nginx/reports/;
        # SPA fallback for Allure's History API routing
        try_files $uri $uri/ /reports/index.html;

        # Cache static assets
        location ~* \.(js|css|png|svg|woff2?)$ {
            expires 1h;
            add_header Cache-Control "public, immutable";
        }
    }

    # Health check endpoint for nginx itself
    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Everything else proxies to Flask/gunicorn
    location / {
        proxy_pass http://flask;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
