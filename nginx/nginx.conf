upstream flask {
    server web:5000;
}

server {
    listen 80;
    server_name _;

    # Allure reports: serve static files directly from shared volume
    location /reports/ {
        alias /usr/share/nginx/reports/;
        # SPA fallback for Allure's History API routing
        try_files $uri $uri/ /reports/index.html;

        # Cache static assets
        location ~* \.(js|css|png|svg|woff2?)$ {
            expires 1h;
            add_header Cache-Control "public, immutable";
        }
    }

    # Health check endpoint for nginx itself
    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Everything else proxies to Flask/gunicorn
    location / {
        proxy_pass http://flask;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
