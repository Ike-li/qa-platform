{% extends "base.html" %}

{% block title %}{{ '编辑' if config else '创建' }}通知配置 - QA Platform{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">{{ '编辑' if config else '创建' }}通知配置 - {{ project.name }}</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    {% if not config %}
                    <div class="mb-3">
                        <label for="channel" class="form-label">通知渠道 <span class="text-danger">*</span></label>
                        <select class="form-select" id="channel" name="channel" required>
                            <option value="">请选择渠道</option>
                            {% for ch in channels %}
                            <option value="{{ ch.value }}">
                                {% if ch.value == 'email' %}邮件
                                {% elif ch.value == 'dingtalk' %}钉钉
                                {% elif ch.value == 'wechat' %}企业微信
                                {% endif %}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    {% else %}
                    <div class="mb-3">
                        <label class="form-label">通知渠道</label>
                        <input type="text" class="form-control" disabled
                               value="{% if config.channel.value == 'email' %}邮件{% elif config.channel.value == 'dingtalk' %}钉钉{% elif config.channel.value == 'wechat' %}企业微信{% endif %}">
                    </div>
                    {% endif %}

                    <div class="mb-3" id="emailField">
                        <label for="email_recipients" class="form-label">邮件收件人（逗号分隔）</label>
                        <input type="text" class="form-control" id="email_recipients" name="email_recipients"
                               value="{{ config.email_recipients if config else '' }}"
                               placeholder="user1@example.com, user2@example.com">
                    </div>

                    <div class="mb-3" id="webhookField">
                        <label for="webhook_url" class="form-label">Webhook URL</label>
                        <input type="url" class="form-control" id="webhook_url" name="webhook_url"
                               value="{{ config.webhook_url if config else '' }}"
                               placeholder="https://oapi.dingtalk.com/robot/send?access_token=...">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">触发事件</label>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="trigger_events" value="execution_done"
                                   id="evt_done" {{ 'checked' if not config or 'execution_done' in (config.trigger_events or []) else '' }}>
                            <label class="form-check-label" for="evt_done">执行完成</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="trigger_events" value="execution_fail"
                                   id="evt_fail" {{ 'checked' if not config or 'execution_fail' in (config.trigger_events or []) else '' }}>
                            <label class="form-check-label" for="evt_fail">执行失败</label>
                        </div>
                    </div>

                    <div class="mb-3 form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="is_active" name="is_active"
                               {{ 'checked' if not config or config.is_active else '' }}>
                        <label class="form-check-label" for="is_active">启用</label>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg"></i> {{ '保存' if config else '创建' }}
                        </button>
                        <a href="{{ url_for('notifications.list_configs') }}" class="btn btn-outline-secondary">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
