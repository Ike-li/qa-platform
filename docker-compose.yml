
services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-qaplatform}
      MYSQL_USER: ${MYSQL_USER:-qauser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-qapass}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - qa-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qa-net

  web:
    build: .
    restart: unless-stopped
    entrypoint: ["/app/docker-entrypoint.sh"]
    command: ["gunicorn", "--worker-class", "gthread", "--workers", "1", "--threads", "100", "--bind", "0.0.0.0:5000", "--timeout", "120", "app:create_app()"]
    env_file:
      - .env
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
    volumes:
      - allure-reports:/app/allure-reports
      - allure-results:/app/allure-results
    expose:
      - "5000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - qa-net

  docker-proxy:
    image: tecnativa/docker-socket-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      POST: 1
      IMAGES: 0
      NETWORKS: 0
      VOLUMES: 0
      SYSTEM: 0
      EXEC: 0
      INFO: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - qa-net

  worker:
    build: .
    restart: unless-stopped
    command: ["celery", "-A", "app.tasks.celery_app", "worker", "--loglevel=info"]
    env_file:
      - .env
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      ENABLE_SANDBOX: ${ENABLE_SANDBOX:-false}
      DOCKER_HOST: tcp://docker-proxy:2375
    volumes:
      - allure-reports:/app/allure-reports
      - allure-results:/app/allure-results
      # Sandbox volume mounts (uncomment when ENABLE_SANDBOX=true):
      # - /data/repos:/data/repos
      # - /data/venvs:/data/venvs
      # - /data/execution_results:/data/execution_results
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
    networks:
      - qa-net

  beat:
    build: .
    restart: unless-stopped
    command: ["celery", "-A", "app.tasks.celery_app", "beat", "--scheduler", "app.tasks.scheduler:DatabaseScheduler", "--loglevel=info"]
    env_file:
      - .env
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - qa-net

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - allure-reports:/usr/share/nginx/reports:ro
    depends_on:
      web:
        condition: service_healthy
    networks:
      - qa-net

volumes:
  mysql-data:
  allure-reports:
  allure-results:

networks:
  qa-net:
    driver: bridge
