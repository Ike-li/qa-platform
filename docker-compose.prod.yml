# ============================================================
# Production overrides for docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================

services:
  mysql:
    restart: always
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    tmpfs:
      - /tmp:size=64m

  redis:
    restart: always
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
        reservations:
          memory: 64m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    restart: always
    command: >
      gunicorn
        --workers 4
        --bind 0.0.0.0:5000
        --timeout 120
        --access-logfile -
        --error-logfile -
        "app:create_app()"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    restart: always
    command: celery -A app.tasks.celery_app worker --loglevel=warning --concurrency=4
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  beat:
    restart: always
    command: >
      celery
        -A app.tasks.celery_app
        beat
        --scheduler app.tasks.scheduler:DatabaseScheduler
        --without-mingle
        --without-gossip
        --loglevel=warning
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
        reservations:
          memory: 64m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    restart: always
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
